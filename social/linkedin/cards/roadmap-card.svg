  <text x="654" y="496" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#ffffff">Upgrade readiness expansion</text>
  <text x="654" y="516" font-family="Inter, sans-serif" font-size="13" fill="#4c3d6e">Deeper 7.6.x → MAS 9 pathway intelligence</text>

