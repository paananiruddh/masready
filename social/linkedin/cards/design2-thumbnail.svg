  <text x="60" y="613" font-family="Inter, sans-serif" font-size="13" fill="#374151">Powered by OverPayingforAI.com</text>
  <text x="1140" y="613" font-family="Inter, sans-serif" font-size="13" fill="#374151" text-anchor="end">masready.com.au</text>
