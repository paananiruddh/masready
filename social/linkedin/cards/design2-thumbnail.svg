  <text x="150" y="499" font-family="Inter, sans-serif" font-size="11" fill="#a3e635">✓ No Mutations</text>
  <text x="262" y="499" font-family="Inter, sans-serif" font-size="11" fill="#a3e635">✓ Review-only</text>
  <text x="366" y="499" font-family="Inter, sans-serif" font-size="11" fill="#a3e635">✓ Demo fixtures only</text>
