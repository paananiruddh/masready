  <text x="600" y="256" font-family="Inter, sans-serif" font-size="50" font-weight="800" fill="url(#pink)">Product</text>
  <text x="600" y="314" font-family="Inter, sans-serif" font-size="50" font-weight="800" fill="url(#pink)">Launch</text>

  <text x="600" y="360" font-family="Inter, sans-serif" font-size="17" fill="#9ca3af">Social-feed energy, launch cards,</text>
  <text x="600" y="382" font-family="Inter, sans-serif" font-size="17" fill="#9ca3af">and shareable proof points.</text>

