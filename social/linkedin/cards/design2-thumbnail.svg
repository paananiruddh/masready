  <text x="80" y="298" font-family="Inter, sans-serif" font-size="40" font-weight="800" fill="#ffffff">7</text>
  <text x="120" y="298" font-family="Inter, sans-serif" font-size="13" fill="#6b7280"> items</text>
  <text x="80" y="330" font-family="Inter, sans-serif" font-size="11" fill="#6b7280">0 critical · 2 high · 3 medium</text>

