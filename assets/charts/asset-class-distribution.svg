<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#07111f" rx="12"/>
  <text x="300" y="36" font-family="Inter,sans-serif" font-size="15" font-weight="700" fill="#eef6ff" text-anchor="middle">Asset Class Distribution — MAS9 Power</text>
  <text x="300" y="54" font-family="Inter,sans-serif" font-size="11" fill="#9fb0c9" text-anchor="middle">Energy &amp; Utilities · fictional demo data only</text>
  <!-- Horizontal bar chart -->
  <!-- Substations -->
  <text x="40" y="106" font-family="Inter,sans-serif" font-size="12" fill="#9fb0c9">Substations</text>
  <rect x="180" y="90" width="242" height="22" rx="4" fill="#54e0ff" fill-opacity="0.85"/>
  <text x="428" y="106" font-family="Inter,sans-serif" font-size="12" fill="#54e0ff">242 (28%)</text>
  <!-- Transformers -->
  <text x="40" y="148" font-family="Inter,sans-serif" font-size="12" fill="#9fb0c9">Transformers</text>
  <rect x="180" y="132" width="198" height="22" rx="4" fill="#8b5cf6" fill-opacity="0.85"/>
  <text x="384" y="148" font-family="Inter,sans-serif" font-size="12" fill="#8b5cf6">198 (23%)</text>
  <!-- Transmission Lines -->
  <text x="40" y="190" font-family="Inter,sans-serif" font-size="12" fill="#9fb0c9">Trans. Lines</text>
  <rect x="180" y="174" width="164" height="22" rx="4" fill="#35e890" fill-opacity="0.85"/>
  <text x="350" y="190" font-family="Inter,sans-serif" font-size="12" fill="#35e890">164 (19%)</text>
  <!-- Smart Meters -->
  <text x="40" y="232" font-family="Inter,sans-serif" font-size="12" fill="#9fb0c9">Smart Meters</text>
  <rect x="180" y="216" width="234" height="22" rx="4" fill="#ffc857" fill-opacity="0.85"/>
  <text x="420" y="232" font-family="Inter,sans-serif" font-size="12" fill="#ffc857">234 (27%)</text>
  <!-- Control Systems -->
  <text x="40" y="274" font-family="Inter,sans-serif" font-size="12" fill="#9fb0c9">Control Sys.</text>
  <rect x="180" y="258" width="26" height="22" rx="4" fill="#ff6b6b" fill-opacity="0.85"/>
  <text x="212" y="274" font-family="Inter,sans-serif" font-size="12" fill="#ff6b6b">26 (3%)</text>
  <!-- Total -->
  <text x="40" y="320" font-family="Inter,sans-serif" font-size="13" font-weight="700" fill="#eef6ff">Total: 864 assets</text>
  <text x="300" y="385" font-family="Inter,sans-serif" font-size="10" fill="#4a5568" text-anchor="middle">MAS9 Power — fictional demo data only</text>
</svg>
