<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#07111f" rx="12"/>
  <text x="300" y="36" font-family="Inter,sans-serif" font-size="15" font-weight="700" fill="#eef6ff" text-anchor="middle">Outage Readiness Score — MAS9 Power</text>
  <text x="300" y="54" font-family="Inter,sans-serif" font-size="11" fill="#9fb0c9" text-anchor="middle">Delivery confidence score · fictional demo data only</text>
  <!-- Arc gauge — using path -->
  <!-- Background arc -->
  <path d="M 120 280 A 170 170 0 0 1 480 280" fill="none" stroke="#233552" stroke-width="28" stroke-linecap="round"/>
  <!-- Score arc — 87/100 = 87% of 180° = 156.6° -->
  <path d="M 120 280 A 170 170 0 0 1 472 264" fill="none" stroke="url(#scoreGrad)" stroke-width="28" stroke-linecap="round"/>
  <defs>
    <linearGradient id="scoreGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#35e890"/>
      <stop offset="100%" style="stop-color:#54e0ff"/>
    </linearGradient>
  </defs>
  <!-- Score label -->
  <text x="300" y="248" font-family="Inter,sans-serif" font-size="72" font-weight="800" fill="#ffffff" text-anchor="middle">87</text>
  <text x="300" y="278" font-family="Inter,sans-serif" font-size="14" fill="#9fb0c9" text-anchor="middle">out of 100</text>
  <!-- Component scores -->
  <rect x="40" y="316" width="120" height="52" rx="6" fill="#233552"/>
  <text x="100" y="338" font-family="Inter,sans-serif" font-size="11" fill="#9fb0c9" text-anchor="middle">Patch Impact</text>
  <text x="100" y="358" font-family="Inter,sans-serif" font-size="16" font-weight="700" fill="#ffc857" text-anchor="middle">78</text>
  <rect x="176" y="316" width="120" height="52" rx="6" fill="#233552"/>
  <text x="236" y="338" font-family="Inter,sans-serif" font-size="11" fill="#9fb0c9" text-anchor="middle">Skill Coverage</text>
  <text x="236" y="358" font-family="Inter,sans-serif" font-size="16" font-weight="700" fill="#35e890" text-anchor="middle">82</text>
  <rect x="312" y="316" width="120" height="52" rx="6" fill="#233552"/>
  <text x="372" y="338" font-family="Inter,sans-serif" font-size="11" fill="#9fb0c9" text-anchor="middle">Licence Health</text>
  <text x="372" y="358" font-family="Inter,sans-serif" font-size="16" font-weight="700" fill="#54e0ff" text-anchor="middle">91</text>
  <rect x="448" y="316" width="120" height="52" rx="6" fill="#233552"/>
  <text x="508" y="338" font-family="Inter,sans-serif" font-size="11" fill="#9fb0c9" text-anchor="middle">Requirements</text>
  <text x="508" y="358" font-family="Inter,sans-serif" font-size="16" font-weight="700" fill="#8b5cf6" text-anchor="middle">91</text>
  <text x="300" y="392" font-family="Inter,sans-serif" font-size="10" fill="#4a5568" text-anchor="middle">MAS9 Power — fictional demo data only · review-only output</text>
</svg>
