<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#07111f" rx="12"/>
  <text x="300" y="36" font-family="Inter,sans-serif" font-size="15" font-weight="700" fill="#eef6ff" text-anchor="middle">User Role Distribution — MAS9 Power</text>
  <text x="300" y="54" font-family="Inter,sans-serif" font-size="11" fill="#9fb0c9" text-anchor="middle">94 named users · 71 active · 23 inactive · fictional demo data</text>
  <!-- Donut -->
  <!-- Total circumference ~= 2π×110 ≈ 691 -->
  <circle cx="210" cy="230" r="110" fill="none" stroke="#233552" stroke-width="36"/>
  <!-- Admin 8% -->
  <circle cx="210" cy="230" r="110" fill="none" stroke="#54e0ff" stroke-width="36" stroke-dasharray="55 636" stroke-dashoffset="0" transform="rotate(-90 210 230)"/>
  <!-- Delivery Lead 12% -->
  <circle cx="210" cy="230" r="110" fill="none" stroke="#8b5cf6" stroke-width="36" stroke-dasharray="83 608" stroke-dashoffset="-55" transform="rotate(-90 210 230)"/>
  <!-- Asset Manager 18% -->
  <circle cx="210" cy="230" r="110" fill="none" stroke="#35e890" stroke-width="36" stroke-dasharray="124 567" stroke-dashoffset="-138" transform="rotate(-90 210 230)"/>
  <!-- Scheduler 15% -->
  <circle cx="210" cy="230" r="110" fill="none" stroke="#ffc857" stroke-width="36" stroke-dasharray="104 587" stroke-dashoffset="-262" transform="rotate(-90 210 230)"/>
  <!-- Field Tech 28% -->
  <circle cx="210" cy="230" r="110" fill="none" stroke="#ff6b6b" stroke-width="36" stroke-dasharray="193 498" stroke-dashoffset="-366" transform="rotate(-90 210 230)"/>
  <!-- Finance/Auditor 19% -->
  <circle cx="210" cy="230" r="110" fill="none" stroke="#60a5fa" stroke-width="36" stroke-dasharray="131 560" stroke-dashoffset="-559" transform="rotate(-90 210 230)"/>
  <!-- Centre label -->
  <text x="210" y="225" font-family="Inter,sans-serif" font-size="28" font-weight="800" fill="#ffffff" text-anchor="middle">94</text>
  <text x="210" y="245" font-family="Inter,sans-serif" font-size="11" fill="#9fb0c9" text-anchor="middle">named users</text>
  <!-- Legend -->
  <circle cx="368" cy="148" r="7" fill="#54e0ff"/><text x="382" y="153" font-family="Inter,sans-serif" font-size="12" fill="#eef6ff">Admin (8%)</text>
  <circle cx="368" cy="176" r="7" fill="#8b5cf6"/><text x="382" y="181" font-family="Inter,sans-serif" font-size="12" fill="#eef6ff">Delivery Lead (12%)</text>
  <circle cx="368" cy="204" r="7" fill="#35e890"/><text x="382" y="209" font-family="Inter,sans-serif" font-size="12" fill="#eef6ff">Asset Manager (18%)</text>
  <circle cx="368" cy="232" r="7" fill="#ffc857"/><text x="382" y="237" font-family="Inter,sans-serif" font-size="12" fill="#eef6ff">Scheduler (15%)</text>
  <circle cx="368" cy="260" r="7" fill="#ff6b6b"/><text x="382" y="265" font-family="Inter,sans-serif" font-size="12" fill="#eef6ff">Field Tech (28%)</text>
  <circle cx="368" cy="288" r="7" fill="#60a5fa"/><text x="382" y="293" font-family="Inter,sans-serif" font-size="12" fill="#eef6ff">Finance / Auditor (19%)</text>
  <text x="300" y="385" font-family="Inter,sans-serif" font-size="10" fill="#4a5568" text-anchor="middle">MAS9 Power — fictional demo data only</text>
</svg>
