kind = "web"
previewPath = "/"
title = "MASReady"
version = "1.0.0"

[[services]]
localPort = 5173
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/masready run dev"

[services.development.env]
PORT = "5173"
BASE_PATH = "/"

[services.production]
serve = "static"

[services.production.build]
args = ["pnpm", "--filter", "@workspace/masready", "run", "build"]

[services.production.build.env]
NODE_ENV = "production"
PORT = "5173"
BASE_PATH = "/"
