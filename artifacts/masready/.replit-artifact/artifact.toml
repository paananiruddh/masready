kind = "web"
previewPath = "/"
title = "MASReady — Maximo Delivery Automation Workbench"
version = "1.0.0"
id = "artifacts/masready"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23369

[services.development]
run = "pnpm --filter @workspace/masready run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/masready", "run", "build" ]
publicDir = "artifacts/masready/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23369"
BASE_PATH = "/"
